<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CARIN海外旗舰店 - 小红书会员绑定</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "微软雅黑", sans-serif;
        }
        body {
            background: #F9F9F9;
            max-width: 750px;
            margin: 0 auto;
            padding-bottom: 30px;
        }
        /* 小红书风格头部 */
        .header {
            background: #FF2442;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        /* 绑定按钮（小红书官方样式） */
        .bind-btn {
            width: 90%;
            height: 50px;
            line-height: 50px;
            background: #FF2442;
            color: white;
            text-align: center;
            border-radius: 25px;
            margin: 30px auto;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            display: block;
            -webkit-tap-highlight-color: transparent; /* 去除小红书内点击高亮 */
        }
        /* 提示文案 */
        .tip {
            text-align: center;
            font-size: 14px;
            color: #666;
            padding: 0 20px;
        }
        /* 店铺信息 */
        .shop-info {
            text-align: center;
            margin: 20px 0;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="header">CARIN海外旗舰店 · 会员绑定</div>
    
    <div class="shop-info">店铺ID：661cc3d974557900017901cf</div>

    <!-- 已嵌入你提供的真实小红书授权链接 -->
    <a href="https://ark.xiaohongshu.com/ark/authorization?appId=f9f31e650cef42c29719&redirectUri=https%3A%2F%2Fcarin890.github.io%2FCARIN520%2F" class="bind-btn">立即绑定小红书会员</a>

    <div class="tip">⚠️ 请在小红书APP内点击绑定<br>绑定后即可享受CARIN专属会员权益</div>

    <!-- 优化版小红书APP适配脚本 -->
    <script>
        const btn = document.querySelector('.bind-btn');
        btn.addEventListener('click', function(e) {
            const userAgent = navigator.userAgent.toLowerCase();
            // 精准检测小红书APP环境（包含XHS缩写适配）
            const isXHSApp = userAgent.includes('xiaohongshu') || userAgent.includes('xhs');
            
            if (!isXHSApp) {
                e.preventDefault();
                alert('请打开小红书APP操作！\n步骤：1. 将本页面链接生成二维码 2. 小红书扫码打开 3. 点击绑定');
                return;
            }
            
            // 小红书APP内强制原生跳转，避免跳转到浏览器
            try {
                if (window.xhs && typeof window.xhs.navigateTo === 'function') {
                    window.xhs.navigateTo(this.href);
                } else {
                    window.location.href = this.href;
                }
            } catch (err) {
                window.location.href = this.href;
            }
        });
    </script>
</body>
</html>

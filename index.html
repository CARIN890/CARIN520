<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CARIN海外旗舰店 - 小红书会员绑定</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "微软雅黑", sans-serif;
        }
        body {
            background: #F9F9F9;
            max-width: 750px;
            margin: 0 auto;
            padding-bottom: 30px;
        }
        /* 小红书风格头部 */
        .header {
            background: #FF2442;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        /* 绑定按钮（小红书官方样式） */
        .bind-btn {
            width: 90%;
            height: 50px;
            line-height: 50px;
            background: #FF2442;
            color: white;
            text-align: center;
            border-radius: 25px;
            margin: 30px auto;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            display: block;
        }
        /* 提示文案 */
        .tip {
            text-align: center;
            font-size: 14px;
            color: #666;
            padding: 0 20px;
        }
        /* 店铺信息 */
        .shop-info {
            text-align: center;
            margin: 20px 0;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="header">CARIN海外旗舰店 · 会员绑定</div>
    
    <div class="shop-info">店铺ID：661cc3d974557900017901cf</div>

    <!-- 核心：适配你店铺的授权链接（直接用你平台复制的链接替换下面的【你的授权链接】） -->
    <a href="https://ark.xiaohongshu.com/ark/authorization?appId=f9f31e650cef42c29719&redirectUri=https%3A%2F%2Fcarin890.github.io%2FCARIN520%2F" class="bind-btn">立即绑定小红书会员</a>

    <div class="tip">⚠️ 请在小红书APP内点击绑定<br>绑定后即可享受CARIN专属会员权益</div>

    <!-- 小红书APP内适配脚本（关键） -->
    <script>
        // 仅允许小红书APP内跳转，避免浏览器报错
        const btn = document.querySelector('.bind-btn');
        btn.onclick = function(e) {
            const userAgent = navigator.userAgent.toLowerCase();
            // 检测是否为小红书APP环境
            if (!userAgent.includes('xiaohongshu')) {
                e.preventDefault();
                alert('请打开小红书APP，扫描页面二维码后再绑定！');
                return;
            }
            // 小红书内正常跳转授权
            window.location.href = this.href;
        };
    </script>
</body>
</html>
